name: publish-pypi

on:
  workflow_dispatch:
  release:
    types:
      - published

permissions:
  contents: read

jobs:
  build-linux:
    name: Build Linux wheels (${{ matrix.python-tag }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-tag:
          - cp310-cp310
          - cp311-cp311
          - cp312-cp312
    env:
      PYTHON_TAG: ${{ matrix.python-tag }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build and repair the wheel (manylinux)
        run: |
          set -euxo pipefail
          docker run --rm \
            -e PYTHON_TAG="${PYTHON_TAG}" \
            -v "${GITHUB_WORKSPACE}:/work" \
            -w /work \
            quay.io/pypa/manylinux_2_28_x86_64 \
            bash -lc '
              set -euxo pipefail

              PYBIN="/opt/python/${PYTHON_TAG}/bin"
              export PYO3_PYTHON="${PYBIN}/python"

              yum install -y curl gcc gcc-c++ make patchelf openssl-devel pkgconfig
              curl https://sh.rustup.rs -sSf | sh -s -- -y --profile minimal
              source /root/.cargo/env

              "${PYBIN}/python" -m pip install --upgrade pip
              "${PYBIN}/python" -m pip install auditwheel build tomli

              export OPENSSL_NO_VENDOR=1
              cargo build --release --manifest-path rust/Cargo.toml
              cp rust/target/release/lib_alchemy.so tinyagent/_alchemy.abi3.so

              "${PYBIN}/python" -c "import sys; sys.path.insert(0, \"tinyagent\"); import _alchemy"
              "${PYBIN}/python" scripts/check_release_binding.py --require-present

              mkdir -p dist wheelhouse
              "${PYBIN}/python" -m build --wheel --outdir dist
              auditwheel repair --plat manylinux_2_28_x86_64 --wheel-dir wheelhouse dist/*.whl

              "${PYBIN}/python" scripts/check_release_wheels.py wheelhouse
              "${PYBIN}/python" scripts/smoke_test_built_wheel.py wheelhouse
            '

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.python-tag }}
          path: wheelhouse/*.whl
          if-no-files-found: error

  build-macos:
    name: Build macOS wheels (py${{ matrix.python }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        python:
          - "3.10"
          - "3.11"
          - "3.12"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Python build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build tomli

      - name: Build and stage the binding
        run: |
          export PYO3_PYTHON="$(python -c 'import sys; print(sys.executable)')"
          # pyo3 builds need macOS to allow unresolved Python symbols at link time.
          # Without this, ld fails with "__Py_NoneStruct" and similar missing symbols.
          export RUSTFLAGS="-C link-arg=-undefined -C link-arg=dynamic_lookup"
          cargo build --release --manifest-path rust/Cargo.toml
          if [ -f rust/target/release/lib_alchemy.dylib ]; then
            cp rust/target/release/lib_alchemy.dylib tinyagent/_alchemy.abi3.so
          elif [ -f rust/target/release/lib_alchemy.so ]; then
            cp rust/target/release/lib_alchemy.so tinyagent/_alchemy.abi3.so
          else
            echo "binding artifact not found in rust/target/release"
            ls -la rust/target/release
            exit 1
          fi
          python -c "import sys; sys.path.insert(0,'tinyagent'); import _alchemy"
          python scripts/check_release_binding.py --require-present

      - name: Build the wheel
        run: |
          mkdir -p dist
          python -m build --wheel --outdir dist

      - name: Verify wheel tags
        run: |
          python scripts/check_release_wheels.py dist

      - name: Smoke test built wheel
        run: |
          python scripts/smoke_test_built_wheel.py dist

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-py${{ matrix.python }}
          path: dist/*.whl
          if-no-files-found: error

  build-windows:
    name: Build Windows wheels (py${{ matrix.python }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python:
          - "3.10"
          - "3.11"
          - "3.12"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Python build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build tomli

      - name: Pin Strawberry Perl for vendored OpenSSL
        shell: pwsh
        run: |
          $perl = 'C:\Strawberry\perl\bin\perl.exe'
          if (Test-Path $perl) {
            "OPENSSL_SRC_PERL=$perl" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            "PERL=$perl" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            & $perl -e "print $^X"
          } else {
            throw 'Strawberry Perl not found at C:\Strawberry\perl\bin\perl.exe'
          }

      - name: Build and stage the binding
        shell: pwsh
        run: |
          $env:PYO3_PYTHON = (python -c "import sys; print(sys.executable)")
          cargo build --release --manifest-path rust/Cargo.toml

          $dll = Get-ChildItem -Path "rust/target/release" -Filter "*alchemy*.dll" | Select-Object -First 1
          if (-not $dll) { throw "binding DLL not found in rust/target/release" }

          Copy-Item $dll.FullName "tinyagent/_alchemy.pyd" -Force
          python -c "import sys; sys.path.insert(0,'tinyagent'); import _alchemy"
          python scripts/check_release_binding.py --require-present

      - name: Build the wheel
        run: |
          mkdir dist
          python -m build --wheel --outdir dist

      - name: Verify wheel tags
        run: |
          python scripts/check_release_wheels.py dist

      - name: Smoke test built wheel
        shell: bash
        run: |
          python scripts/smoke_test_built_wheel.py dist

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-py${{ matrix.python }}
          path: dist/*.whl
          if-no-files-found: error

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs:
      - build-linux
      - build-macos
      - build-windows
    steps:
      - name: Download built wheels
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: wheels-*
          merge-multiple: true

      - name: Publish distributions
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          password: ${{ secrets.PYPI_TOKEN }}
          user: __token__
