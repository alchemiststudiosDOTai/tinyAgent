id: harness-no-duck-typed-access
language: python
severity: error
message: >-
  Avoid duck-typed access on typed harness values (event/message/model/etc).
  Use explicit model types with isinstance narrowing and direct attributes.
rule:
  any:
    - pattern: getattr($OBJ, $ATTR)
    - pattern: getattr($OBJ, $ATTR, $DEFAULT)
    - pattern: $OBJ.get($$$ARGS)
    - pattern: isinstance($OBJ, dict)
constraints:
  OBJ:
    regex: "^(event|ev|msg|message|model|state|partial|context|options|tool_call|assistant_message_event|ame|result)$"
